<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Selector</title>
    <link rel="stylesheet" href="birds.css">
</head>
<body>

<main>
    <h1>Bird Selector</h1>

    <!-- Bird image + caption -->
    <img id="bird-image" src="http://www.outgrabe.net/bird00.jpg" alt="Pardalote">
    <p id="bird-caption">Pardalote by fir0002 (CC-by-NC)</p>

    <!-- Buttons for each bird -->
    <div>
        <button data-bird="0">Pardalote</button>
        <button data-bird="1">Purple Swamp Hen</button>
        <button data-bird="2">White-headed Stilt</button>
        <button data-bird="3">Inland Thornbill</button>
        <button data-bird="4">Rose Robin</button>
    </div>
</main>

<script src="birds.js"></script>
</body>
</html>
